<!DOCTYPE html>
<html>
<head>
  <title>My YouTube Channel</title>
  <style>
    body { font-family: Arial; background: #f9f9f9; padding: 20px; }
    h1 { color: red; }
    .video { background: white; margin: 15px 0; padding: 15px; 
             border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    img { width: 300px; border-radius: 5px; display: block; margin-bottom: 10px; }
    a { text-decoration: none; color: #333; font-size: 16px; font-weight: bold; }
    #error { color: red; font-size: 14px; margin-top: 20px; }
  </style>
</head>
<body>
  <h1>🎬 My YouTube Channel</h1>
  <div id="error"></div>
  <div id="videos"></div>

  <script>
    const API_KEY = "AIzaSyASIJ_QoHwAMKHWzgiWI1U5yXzVhNje7bA";
    const CHANNEL_ID = "UCQyt4GMejh3cE1JtHBwaBCg";

    const url = `https://www.googleapis.com/youtube/v3/search?key=${API_KEY}&channelId=${CHANNEL_ID}&part=snippet&type=video&maxResults=10&order=date`;

    fetch(url)
      .then(r => r.json())
      .then(data => {
        console.log(data);
        if(data.error) {
          document.getElementById("error").innerText = 
            "Error: " + data.error.message;
          return;
        }
        if(!data.items || data.items.length === 0) {
          document.getElementById("error").innerText = 
            "No videos found. Check your Channel ID.";
          return;
        }
        const container = document.getElementById("videos");
        data.items.forEach(item => {
          const vid = item.id.videoId;
          const title = item.snippet.title;
          const thumb = item.snippet.thumbnails.medium.url;
          const desc = item.snippet.description.substring(0,100);
          container.innerHTML += `
            <div class="video">
              <img src="${thumb}" />
              <a href="https://www.youtube.com/watch?v=${vid}" 
                 target="_blank">${title}</a>
              <p>${desc}...</p>
            </div>`;
        });
      })
      .catch(err => {
        document.getElementById("error").innerText = 
          "Failed to load videos: " + err.message;
      });
  </script>
</body>
</html>
