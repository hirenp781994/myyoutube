<!DOCTYPE html>
<html>
<head>
  <title>My YouTube Channel</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial; background: #f9f9f9; }

    .topbar { background: #ff0000; padding: 15px 30px; 
              display: flex; justify-content: space-between; align-items: center; }
    .topbar h1 { color: white; font-size: 22px; }
    .topbar a { color: white; text-decoration: none; font-size: 15px; 
                background: #cc0000; padding: 8px 16px; border-radius: 5px; }
    .topbar a:hover { background: #aa0000; }

    .instagram-bar { background: linear-gradient(to right, #833ab4, #fd1d1d, #fcb045);
                     padding: 12px 30px; display: flex; align-items: center; gap: 10px; }
    .instagram-bar a { color: white; text-decoration: none; font-size: 15px; font-weight: bold; }
    .instagram-bar a:hover { text-decoration: underline; }

    .container { padding: 20px 30px; }
    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 20px; }
    .video-card { background: white; border-radius: 8px; 
                  box-shadow: 0 2px 8px rgba(0,0,0,0.1); overflow: hidden; }
    .video-card img { width: 100%; }
    .video-info { padding: 10px; }
    .video-info a { text-decoration: none; color: #222; font-size: 14px; font-weight: bold; }
    .video-info p { color: #888; font-size: 12px; margin-top: 5px; }
    #error { color: red; font-size: 14px; margin-top: 20px; }
  </style>
</head>
<body>

  <div class="topbar">
    <h1>🎬 My YouTube Channel</h1>
    <a href="https://www.instagram.com/bellanova_tm" target="_blank">
      📸 Follow on Instagram
    </a>
  </div>

  <div class="instagram-bar">
    <span>📸</span>
    <a href="https://www.instagram.com/bellanova_tm" target="_blank">
      Follow me on Instagram @bellanova_tm
    </a>
  </div>

  <div class="container">
    <h2>Latest Videos</h2>
    <div id="error"></div>
    <div class="grid" id="videos"></div>
  </div>

  <script>
    const API_KEY = "AIzaSyASIJ_QoHwAMKHWzgiWI1U5yXzVhNje7bA";
    const CHANNEL_ID = "UCQyt4GMejh3cE1JtHBwaBCg";

    const url = `https://www.googleapis.com/youtube/v3/search?key=${API_KEY}&channelId=${CHANNEL_ID}&part=snippet&type=video&maxResults=10&order=date`;

    fetch(url)
      .then(r => r.json())
      .then(data => {
        if(data.error) {
          document.getElementById("error").innerText = "Error: " + data.error.message;
          return;
        }
        if(!data.items || data.items.length === 0) {
          document.getElementById("error").innerText = "No videos found yet. Upload your first video!";
          return;
        }
        const container = document.getElementById("videos");
        data.items.forEach(item => {
          const vid = item.id.videoId;
          const title = item.snippet.title;
          const thumb = item.snippet.thumbnails.medium.url;
          const date = new Date(item.snippet.publishedAt).toDateString();
          container.innerHTML += `
            <div class="video-card">
              <a href="https://www.youtube.com/watch?v=${vid}" target="_blank">
                <img src="${thumb}" />
              </a>
              <div class="video-info">
                <a href="https://www.youtube.com/watch?v=${vid}" target="_blank">${title}</a>
                <p>${date}</p>
              </div>
            </div>`;
        });
      })
      .catch(err => {
        document.getElementById("error").innerText = "Failed to load: " + err.message;
      });
  </script>
</body>
</html>
